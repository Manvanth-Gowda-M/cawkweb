<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#FFFFFF" stroke="#007BFF" stroke-width="4"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#28A745;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Medical Cross Symbol -->
  <g transform="translate(100, 100)">
    <!-- Vertical Bar -->
    <rect x="-15" y="-50" width="30" height="100" rx="8" fill="url(#grad1)"/>
    <!-- Horizontal Bar -->
    <rect x="-50" y="-15" width="100" height="30" rx="8" fill="url(#grad1)"/>
  </g>
  
  <!-- CAWK Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#1A1A1A">CAWK</text>
  
  <!-- Small Tagline -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#6C757D">Healthcare Anywhere</text>
</svg>
